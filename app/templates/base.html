<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or 'AURA Admin Panel' }}</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #000000;
            --panel: #0a0a0a;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --border: #1f2937;
            --primary: #6d28d9;
            --primary-dark: #5b21b6;
            --primary-light: #7c3aed;
            --success-bg: #052e16;
            --success-text: #86efac;
            --error-bg: #3a1f1f;
            --error-text: #fca5a5;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 20px 48px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        h1, h2 {
            margin-top: 0;
            color: var(--text);
        }

        p {
            margin: 0 0 20px;
        }

        .muted {
            color: var(--muted);
        }

        .message {
            margin: 0 0 20px;
            padding: 14px 16px;
            border-radius: 8px;
            background: var(--success-bg);
            color: var(--success-text);
            border: 1px solid #1b4e34;
            font-weight: 500;
        }

        .error-message {
            background: var(--error-bg);
            color: var(--error-text);
            border-color: #7a4545;
        }

        .nav {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .nav a,
        .button,
        button {
            display: inline-block;
            border: 1px solid var(--primary);
            background: var(--primary);
            color: #fff;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav a:hover,
        .button:hover,
        button:hover {
            background: var(--primary-light);
            border-color: var(--primary-light);
            transform: translateY(-1px);
        }

        .nav a.secondary,
        .button.secondary,
        button.secondary {
            background: transparent;
            color: var(--primary-light);
            border: 1px solid var(--primary);
        }

        .nav a.secondary:hover,
        .button.secondary:hover,
        button.secondary:hover {
            background: var(--primary);
            color: #fff;
        }

        label {
            display: block;
            margin: 16px 0 6px;
            font-weight: 500;
            color: var(--text);
        }

        input, select {
            width: 100%;
            max-width: 420px;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background: #0a0a0a;
            color: var(--text);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(109, 40, 217, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            text-align: left;
            padding: 14px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        th {
            background: rgba(109, 40, 217, 0.1);
            font-weight: 600;
            color: var(--text);
        }

        tr:hover {
            background: rgba(109, 40, 217, 0.05);
        }

        form.inline {
            display: inline;
        }

        .actions {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 24px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="page">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
